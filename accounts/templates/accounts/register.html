{% extends "accounts/base.html" %}
{% block title %}ユーザ登録{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand-mark"><span>🀄 Mahjong Score</span></div>
    <p class="auth-eyebrow">新規登録</p>
    <h1 class="auth-title">ユーザ登録</h1>
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">ユーザ名</label>
        <input type="text" id="username" name="username" value="{{ request.POST.username }}" placeholder="ユーザ名" autofocus>
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" placeholder="4文字以上">
      </div>
      <div class="form-group">
        <label for="password_confirm">パスワード（確認）</label>
        <input type="password" id="password_confirm" name="password_confirm" placeholder="再入力">
      </div>
      <button type="submit" class="btn btn-primary btn-full">登録する</button>
    </form>
    <div class="auth-footer">
      すでにアカウントをお持ちの方は <a href="{% url 'login' %}">ログインはこちら</a>
    </div>
  </div>
</div>
{% endblock %}
