{% extends "accounts/base.html" %}
{% block title %}ユーザ編集{% endblock %}
{% block body %}
<div class="app-shell">
  <header class="topbar">
    <a href="{% url 'game_list' %}" class="topbar-brand">🀄 MJS</a>
    <nav class="topbar-nav">
      <a href="{% url 'game_list' %}">対局一覧</a>
      <a href="{% url 'user_list' %}" class="active">ユーザ管理</a>
      <div class="nav-sep"></div>
      <span class="topbar-user">{{ request.user.username }}</span>
      <a href="{% url 'logout' %}">ログアウト</a>
    </nav>
  </header>
  <main class="page-main">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
    <div class="page-header">
      <div class="page-header-left">
        <p class="page-eyebrow">編集 — #{{ target_user.id }}</p>
        <h1 class="page-title">ユーザ編集</h1>
      </div>
    </div>
    <div class="card" style="max-width:480px">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="username">ユーザ名</label>
          <input type="text" id="username" name="username"
            value="{% if request.method == 'POST' %}{{ request.POST.username }}{% else %}{{ target_user.username }}{% endif %}" autofocus>
        </div>
        <div class="form-group">
          <label for="password">新しいパスワード <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--ink-muted)">（変更しない場合は空欄）</span></label>
          <input type="password" id="password" name="password" placeholder="新しいパスワード">
        </div>
        <div class="form-group">
          <label for="password_confirm">新しいパスワード（確認）</label>
          <input type="password" id="password_confirm" name="password_confirm" placeholder="再入力">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-accent">更新する</button>
          <a href="{% url 'user_list' %}" class="btn btn-ghost">キャンセル</a>
        </div>
      </form>
    </div>
  </main>
</div>
{% endblock %}
